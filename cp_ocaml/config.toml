author = "Ayush Biswas"

editor = "code"
editor_arguments = []

[code]
filename = '''{{#if (regex_is_match pattern="codeforces.com" on=url)}} {{#with (regex_captures
    pattern="(?:problemset/problem|contest)/(\\d+)(?:/problem)?/([A-Za-z0-9]+)"
    on=url) as |url_parts|}} {{#with (regex_captures
      pattern="^[A-Za-z0-9]+\\.\\s*(.+)$"
      on=../title) as |title_parts|}}
./src/bin/cf_{{url_parts._1}}_{{to_lower_case url_parts._2}}_{{to_snake_case title_parts._1}}.ml
{{/with}}
{{/with}}
{{/if}}
{{#if (regex_is_match pattern="atcoder.jp" on=url)}} {{#with (regex_captures
  pattern="contests/([^/]+)/tasks/([^_]+)_([a-z]+)"
  on=url) as |url_parts|}} {{#with (regex_captures
    pattern="^[A-Za-z0-9]+\\s*\\-\\s*(.+)$"
    on=../title) as |title_parts|}}
./src/bin/{{url_parts._2}}_{{to_lower_case url_parts._3}}{{#if (to_snake_case title_parts._1)}}_{{to_snake_case title_parts._1}}{{/if}}.ml
{{/with}}
{{/with}}
{{/if}}
{{#if (regex_is_match pattern="cses.fi" on=url)}}
{{#with (regex_captures
  pattern="problemset/task/(\\d+)/?$"
  on=url) as |url_parts|}}
./src/bin/cses_{{url_parts._1}}_{{to_snake_case ../title}}.ml
{{/with}}
{{/if}}
{{#if (regex_is_match pattern="judge.u-aizu.ac.jp" on=url)}}
{{#with (regex_captures
  pattern="description\\.jsp\\?id=([A-Za-z0-9_]+)"
  on=url) as |url_parts|}}
./src/bin/aoj_{{url_parts._1}}_{{to_kebab_case ../title}}.ml
{{/with}}
{{/if}}
{{#if (regex_is_match pattern="open.kattis.com" on=url)}}
{{#with (regex_captures
  pattern="problems/([^/?]+)/?"
  on=url) as |url_parts|}}
./src/bin/{{url_parts._1}}.ml
{{/with}}
{{/if}}
'''
template = "./src/main.ml"
modifier = ''' {{!-- Triple braces to prevent html escaping --}}
{{!-- Iterate over each library is lib_files --}}
{{#each lib_files}}

module Lib = struct

module {{to_pascal_case this.0}} = struct
    {{{this.1}}}
end

end

{{/each}}
{{!-- Base code block --}}
{{{code}}}
'''
lib_check_regex = "open Lib"

[include]
dsu = "./src/lib/dsu.ml"

[toggle]
create_file = true
run_on_save = true
submit_on_ac = false
