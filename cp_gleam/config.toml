author = "Ayush Biswas"

editor = "code"

[code]
filename = ''' {{#if (regex_is_match pattern="codeforces.com" on=url)}} {{#with (regex_captures
    pattern="(?:problemset/problem|contest)/(\\d+)(?:/problem)?/([A-Za-z0-9]+)"
    on=url) as |url_parts|}} {{#with (regex_captures
      pattern="^[A-Za-z0-9]+\\.\\s*(.+)$"
      on=../title) as |title_parts|}}
./src/bin/{{url_parts._1}}_{{to_lower_case url_parts._2}}.gleam
{{/with}}
{{/with}}
{{/if}}
{{#if (regex_is_match pattern="atcoder.jp" on=url)}} {{#with (regex_captures
  pattern="contests/([^/]+)/tasks/([^_]+)_([a-z]+)"
  on=url) as |url_parts|}} {{#with (regex_captures
    pattern="^[A-Za-z0-9]+\\s*\\-\\s*(.+)$"
    on=../title) as |title_parts|}}
./src/bin/{{url_parts._1}}_{{to_lower_case url_parts._3}}.gleam
{{/with}}
{{/with}}
{{/if}}
{{#if (regex_is_match pattern="cses.fi" on=url)}}
{{#with (regex_captures
  pattern="problemset/task/(\\d+)/?$"
  on=url) as |url_parts|}}
./src/bin/cses_{{url_parts._1}}.gleam
{{/with}}
{{/if}}
{{#if (regex_is_match pattern="judge.u-aizu.ac.jp" on=url)}}
{{#with (regex_captures
  pattern="description\\.jsp\\?id=([A-Za-z0-9_]+)"
  on=url) as |url_parts|}}
./src/bin/aoj-{{url_parts._1}}-{{to_kebab_case ../title}}.gleam
{{/with}}
{{/if}}
'''
template = "./src/main.gleam"
modifier = ''' 
{{{code}}}

{{#each lib_files}}
{{{this.1}}}
{{/each}}
'''
lib_check_regex = "import\\s*lib/{{name}}"

[include]
lib = "./src/lib/"

[toggle]
create_file = true
run_on_save = false
submit_on_ac = false
